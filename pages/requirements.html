<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Requirements</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <h1>Project Requirements</h1>

    <section id="functional-section">
        <h2>Functional Requirements</h2>
        <div id="functional-requirements">
            
        </div>
    </section>

    <section id="non-functional-section">
        <h2>Non-Functional Requirements</h2>
        <div id="non-functional-requirements">
         
        </div>
    </section>

    <section id="add-requirement-section">
        <h2>Add Requirement</h2>

        <form id="requirement-form">

            <label for="requirement-text">Requirement:</label>
            <input 
                type="text" 
                id="requirement-text"
                placeholder="Enter requirement"
                required
            >

            <label for="requirement-type">Type:</label>
            <select id="requirement-type">
                <option value="Functional">Functional</option>
                <option value="Non-Functional">Non-Functional</option>
            </select>

            <button type="submit">
                Add Requirement
            </button>

        </form>
    </section>

    <script src="../js/requirements.js"></script>
    <script src="../js/store.js"></script>
    
</body>
</html>
